services:
  reverse-proxy:
    container_name: reverse-proxy
    ports:
      - "8080:8080"
    depends_on:
      - letsencrypt-app
      - letsencrypt-server
    networks:
      - maks-it

  letsencrypt-app:
    container_name: letsencrypt-app
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - LETSENCRYPT_SERVER=http://localhost:8080
    networks:
      - maks-it

  letsencrypt-server:
    container_name: letsencrypt-server
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=5000
    volumes:
      - D:\Compose\MaksIT.CertsUI\acme:/acme
      - D:\Compose\MaksIT.CertsUI\cache:/cache
      - D:\Compose\MaksIT.CertsUI\configMap\appsettings.json:/configMap/appsettings.json:ro
      - D:\Compose\MaksIT.CertsUI\secrets\appsecrets.json:/secrets/appsecrets.json:ro
    networks:
      - maks-it

networks:
  maks-it:
    driver: bridge